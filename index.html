<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Zenith - v3.6</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #87CEEB; }
        
        /* Main UI Menus */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background-color: rgba(2, 6, 23, 0.9); z-index: 10; }
        .menu-panel { text-align: center; color: #f8fafc; background: #0f172a; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 440px; display: none; border: 1px solid #1e293b; }
        #start-menu { display: block; }
        button { background: #38bdf8; color: #0f172a; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 1rem; margin-top: 10px; font-weight: bold; width: 100%; transition: all 0.2s; }
        button:hover { background: #7dd3fc; transform: translateY(-2px); }
        button.secondary { background: #334155; color: #f8fafc; }
        button.secondary:hover { background: #475569; }
        button.active-weapon { border: 2px solid #38bdf8; background: #0c4a6e; }
        h1 { margin: 0 0 10px 0; color: #38bdf8; }
        .version { font-size: 0.8rem; color: #64748b; margin-top: 15px; display: block; }
        
        /* HUD Elements */
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #ef4444; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 5; box-shadow: 0 0 5px rgba(239, 68, 68, 0.8); transition: opacity 0.2s; }
        #scope-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 6; background: radial-gradient(circle, transparent 35%, rgba(0,0,0,0.95) 70%, black 100%); }
        #scope-crosshair-x { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(0, 0, 0, 0.8); transform: translateY(-50%); }
        #scope-crosshair-y { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: rgba(0, 0, 0, 0.8); transform: translateX(-50%); }
        
        #stats-ui { position: absolute; top: 20px; left: 20px; color: #38bdf8; font-weight: bold; display: none; z-index: 5; background: rgba(15, 23, 42, 0.8); padding: 15px 25px; border-radius: 8px; border: 1px solid #1e293b; text-align: left; }
        .stat-line { font-size: 1.2rem; margin: 5px 0; }
        #hp-bar-container { width: 150px; height: 10px; background: #334155; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ef4444; transition: width 0.3s; }
        
        /* Weapon HUD */
        #weapon-hud { position: absolute; bottom: 20px; right: 20px; color: #38bdf8; font-weight: bold; display: none; z-index: 5; background: rgba(15, 23, 42, 0.8); padding: 15px 25px; border-radius: 8px; border: 1px solid #1e293b; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }

        /* Kill Effects */
        #kill-feed { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; z-index: 5; pointer-events: none; }
        .kill-msg { background: rgba(15, 23, 42, 0.8); color: #f8fafc; padding: 6px 15px; border-radius: 4px; border-right: 4px solid #ef4444; font-size: 0.9rem; font-weight: bold; animation: slideOut 3.5s forwards; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        @keyframes slideOut { 0% { opacity: 0; transform: translateX(20px); } 10% { opacity: 1; transform: translateX(0); } 80% { opacity: 1; transform: translateX(0); } 100% { opacity: 0; transform: translateX(20px); } }
        #kill-popup { position: absolute; top: 15%; left: 50%; transform: translateX(-50%); font-size: 2.2rem; color: #ef4444; font-weight: bold; text-shadow: 0 0 15px rgba(239, 68, 68, 0.9); opacity: 0; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 5; pointer-events: none; letter-spacing: 2px; }
        #kill-popup.show { opacity: 1; transform: translate(-50%, -20px) scale(1.1); }
        
        /* Death Screen */
        #death-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        #death-screen h1 { font-size: 5rem; color: #ef4444; text-transform: uppercase; margin-bottom: 10px; text-shadow: 0 0 20px rgba(239, 68, 68, 0.5); letter-spacing: 5px; }
        #death-screen h2 { color: #f8fafc; font-size: 1.5rem; margin-bottom: 30px; font-weight: normal; }
        .death-stats { background: rgba(2, 6, 23, 0.8); padding: 20px 40px; border-radius: 8px; border: 1px solid #334155; margin-bottom: 40px; color: #38bdf8; font-size: 1.5rem; font-weight: bold; display: flex; gap: 40px; }
        .respawn-btn { background: #ef4444; color: white; border: none; padding: 15px 50px; font-size: 1.5rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); }
        .respawn-btn:hover { background: #dc2626; transform: scale(1.05); }

        .setting-row { margin: 15px 0; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        input[type=range] { width: 50%; cursor: pointer; }
        .weapon-btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    </style>
</head>
<body oncontextmenu="return false;">
    <div id="ui-layer">
        <div id="start-menu" class="menu-panel">
            <h1>Project: Zenith</h1>
            <p>Zombie Survival Protocol</p>
            <button id="play-btn">START SIMULATION</button>
            <button id="settings-btn" class="secondary">SETTINGS HUB</button>
            <span class="version">Version 3.6 - Pistol ADS Fix</span>
        </div>

        <div id="settings-main-menu" class="menu-panel">
            <h1>Settings Hub</h1>
            <button id="open-general">GENERAL (CONTROLS)</button>
            <button id="open-arsenal">ARSENAL (WEAPONS)</button>
            <button id="open-physics">PHYSICS & SYSTEMS</button>
            <button id="open-visuals">VISUALS</button>
            <button id="back-to-main" class="secondary">BACK TO MENU</button>
        </div>

        <div id="general-menu" class="menu-panel">
            <h1>General Controls</h1>
            <div class="setting-row">
                <label>Sensitivity: <span id="sens-val">1.0</span></label>
                <input type="range" id="sens-slider" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>
            <button class="back-to-settings secondary">BACK</button>
        </div>

        <div id="arsenal-menu" class="menu-panel">
            <h1>Arsenal</h1>
            <div class="weapon-btn-grid">
                <button class="wep-select" data-idx="0">[1] Recon Pistol</button>
                <button class="wep-select" data-idx="1">[2] Stinger SMG</button>
                <button class="wep-select" data-idx="2">[5] Hyper-Rail</button>
                <button class="wep-select" data-idx="3">[4] Nova Launcher</button>
                <button class="wep-select" style="grid-column: span 2;" data-idx="4">[3] Ranger Sniper</button>
            </div>
            <button class="back-to-settings secondary" style="margin-top:20px;">BACK</button>
        </div>

        <div id="physics-menu" class="menu-panel">
            <h1>Systems</h1>
            <div class="setting-row">
                <label>Jump Force: <span id="jump-val">80</span></label>
                <input type="range" id="jump-slider" min="40" max="150" value="80">
            </div>
            <div class="setting-row">
                <label>Health System</label>
                <input type="checkbox" id="hp-toggle" checked>
            </div>
            <button class="back-to-settings secondary">BACK</button>
        </div>

        <div id="visuals-menu" class="menu-panel">
            <h1>Visuals</h1>
            <div class="setting-row">
                <label>Target Color</label>
                <input type="color" id="target-color-picker" value="#3498db">
            </div>
            <button class="back-to-settings secondary">BACK</button>
        </div>
    </div>

    <div id="death-screen">
        <h1>SYSTEM CRITICAL</h1>
        <h2>You were eliminated by the horde.</h2>
        <div class="death-stats">
            <div>FINAL SCORE: <span id="death-score-val" style="color:#f8fafc;">0</span></div>
            <div>TOTAL KILLS: <span id="death-kills-val" style="color:#f8fafc;">0</span></div>
        </div>
        <button class="respawn-btn" id="respawn-btn">INITIALIZE RESPAWN</button>
    </div>

    <div id="crosshair"></div>
    <div id="scope-overlay">
        <div id="scope-crosshair-x"></div>
        <div id="scope-crosshair-y"></div>
    </div>
    
    <div id="kill-popup">+1 KILL</div>
    <div id="kill-feed"></div>
    
    <div id="stats-ui">
        <div class="stat-line">SCORE: <span id="score-val">0</span></div>
        <div class="stat-line">KILLS: <span id="kills-val">0</span></div>
        <div class="stat-line">HP: <span id="hp-val">100</span></div>
        <div id="hp-bar-container"><div id="hp-bar-fill"></div></div>
    </div>

    <div id="weapon-hud">[1] PISTOL</div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.150.1/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/" } } </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // FIXED PISTOL adsY BACK TO -0.38 for proper iron sight notch alignment
        const WEAPONS = [
            { name: "Pistol", fireRate: 350, projSpeed: 600, size: 0.3, modelColor: 0x64748b, scale: 1.0, auto: false, zoom: 1.3, sight: 'iron', damage: 20, adsY: -0.38, adsZ: -0.8 },
            { name: "SMG", fireRate: 80, projSpeed: 700, size: 0.15, modelColor: 0x334155, scale: 0.8, auto: true, zoom: 1.2, sight: 'reflex', damage: 10, adsY: -0.36, adsZ: -0.8 },
            { name: "Rail", fireRate: 1200, projSpeed: 3000, size: 0.1, modelColor: 0x0ea5e9, scale: 1.2, auto: false, zoom: 2.0, sight: 'scope', damage: 100, adsY: -0.42, adsZ: -0.55 },
            { name: "Nova", fireRate: 1500, projSpeed: 150, size: 1.2, modelColor: 0xf59e0b, scale: 1.5, auto: false, zoom: 1.1, sight: 'none', damage: 75, adsY: -0.60, adsZ: -1.2 },
            { name: "Sniper", fireRate: 1800, projSpeed: 4000, size: 0.2, modelColor: 0x10b981, scale: 1.8, auto: false, zoom: 4.0, sight: 'scope', damage: 60, adsY: -0.63, adsZ: -0.55 }
        ];

        let camera, scene, renderer, controls, raycaster, barrelTip;
        const obstacles = [], obstacleBBs = [], activeProjectiles = [], particles = [], enemies = [], targets = [];
        let score = 0, kills = 0, playerHP = 100, prevTime = performance.now(), lastFireTime = 0;
        const velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false, isSprinting = false;
        let isShooting = false, justClicked = false, isADS = false, isDead = false, killPopupTimeout;

        let currentWeaponIdx = 0, viewmodelGroup, sightIronGroup, sightReflexGroup, sightScopeGroup;
        let JUMP_FORCE = 80, SENSITIVITY = 1.0, TARGET_COLOR = 0x3498db, PROJ_COLOR = 0xef4444, HP_ENABLED = true;
        const PLAYER_HEIGHT = 10, GRAVITY = 200.0, PLAYER_RADIUS = 3, STEP_OFFSET = 2.1, BASE_FOV = 75;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, type, duration) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(BASE_FOV, window.innerWidth / window.innerHeight, 0.1, 5000);
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            const ambientLight = new THREE.HemisphereLight(0xffffff, 0x8d99ae, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
            dirLight.position.set(500, 1000, 500);
            scene.add(dirLight);

            controls = new PointerLockControls(camera, document.body);
            scene.add(controls.getObject());
            controls.getObject().position.set(0, 50, 200);

            raycaster = new THREE.Raycaster();

            // Build Viewmodel Base
            viewmodelGroup = new THREE.Group();
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x334155 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 2), bodyMat);
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 1.5), new THREE.MeshPhongMaterial({ color: 0x1e293b }));
            barrel.rotation.x = Math.PI / 2; barrel.position.z = -1;
            viewmodelGroup.add(body, barrel);
            
            const opticsMat = new THREE.MeshPhongMaterial({color: 0x111111});

            // 1. IRON SIGHTS Component
            sightIronGroup = new THREE.Group();
            const rearL = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.15, 0.1), opticsMat);
            rearL.position.set(-0.06, 0.3, 0.8);
            const rearR = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.15, 0.1), opticsMat);
            rearR.position.set(0.06, 0.3, 0.8);
            const frontSight = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.15, 0.1), opticsMat);
            frontSight.position.set(0, 0.3, -0.8);
            sightIronGroup.add(rearL, rearR, frontSight);
            viewmodelGroup.add(sightIronGroup);

            // 2. REFLEX SIGHT Component (Red Dot)
            sightReflexGroup = new THREE.Group();
            const reflexBase = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.1, 0.3), opticsMat);
            reflexBase.position.set(0, 0.3, 0);
            const reflexFrameGeom = new THREE.CylinderGeometry(0.12, 0.12, 0.05, 16, 1, true); 
            const reflexFrameMat = new THREE.MeshPhongMaterial({color: 0x111111, side: THREE.DoubleSide});
            const reflexFrame = new THREE.Mesh(reflexFrameGeom, reflexFrameMat);
            reflexFrame.rotation.x = Math.PI / 2;
            reflexFrame.position.set(0, 0.45, 0);
            const reflexDotMat = new THREE.MeshBasicMaterial({color: 0xff0000, transparent: true, opacity: 0.7});
            const reflexDot = new THREE.Mesh(new THREE.BoxGeometry(0.008, 0.008, 0.008), reflexDotMat);
            reflexDot.position.set(0, 0.45, 0); 
            sightReflexGroup.add(reflexBase, reflexFrame, reflexDot);
            viewmodelGroup.add(sightReflexGroup);

            // 3. SNIPER SCOPE Component
            sightScopeGroup = new THREE.Group();
            const scTubeGeom = new THREE.CylinderGeometry(0.12, 0.12, 1.2, 16, 1, true); 
            const scTubeMat = new THREE.MeshPhongMaterial({color: 0x0a0a0a, side: THREE.DoubleSide}); 
            const scTube = new THREE.Mesh(scTubeGeom, scTubeMat);
            scTube.rotation.x = Math.PI/2;
            scTube.position.y = 0.35; 
            scTube.position.z = -0.2;
            sightScopeGroup.add(scTube);
            viewmodelGroup.add(sightScopeGroup);

            barrelTip = new THREE.Object3D(); barrelTip.position.set(0, 0, -1.8);
            viewmodelGroup.add(barrelTip);
            
            viewmodelGroup.position.set(0.8, -0.6, -1.5);
            camera.add(viewmodelGroup);

            // UI logic
            const showPanel = (id) => { document.querySelectorAll('.menu-panel').forEach(p => p.style.display = 'none'); document.getElementById(id).style.display = 'block'; };
            document.getElementById('play-btn').onclick = () => { controls.lock(); audioCtx.resume(); };
            document.getElementById('settings-btn').onclick = () => showPanel('settings-main-menu');
            document.getElementById('open-general').onclick = () => showPanel('general-menu');
            document.getElementById('open-arsenal').onclick = () => { showPanel('arsenal-menu'); updateArsenalUI(); };
            document.getElementById('open-physics').onclick = () => showPanel('physics-menu');
            document.getElementById('open-visuals').onclick = () => showPanel('visuals-menu');
            document.getElementById('back-to-main').onclick = () => showPanel('start-menu');
            document.querySelectorAll('.back-to-settings').forEach(b => b.onclick = () => showPanel('settings-main-menu'));

            document.getElementById('sens-slider').oninput = (e) => { SENSITIVITY = parseFloat(e.target.value); document.getElementById('sens-val').innerText = SENSITIVITY; };
            document.getElementById('jump-slider').oninput = (e) => { JUMP_FORCE = parseFloat(e.target.value); document.getElementById('jump-val').innerText = e.target.value; };
            document.getElementById('hp-toggle').onchange = (e) => { HP_ENABLED = e.target.checked; };
            document.querySelectorAll('.wep-select').forEach(b => b.onclick = (e) => { currentWeaponIdx = parseInt(e.target.dataset.idx); updateArsenalUI(); updateViewmodel(); });

            document.getElementById('respawn-btn').onclick = () => {
                document.getElementById('death-screen').style.display = 'none';
                resetGame();
                isDead = false;
                controls.lock();
            };

            controls.addEventListener('lock', () => { 
                document.getElementById('ui-layer').style.display = 'none'; 
                document.getElementById('stats-ui').style.display = 'block'; 
                document.getElementById('weapon-hud').style.display = 'block';
                
                const wep = WEAPONS[currentWeaponIdx];
                if (!(isADS && (wep.sight === 'scope' || wep.sight === 'iron' || wep.sight === 'reflex'))) {
                    document.getElementById('crosshair').style.display = 'block'; 
                }
            });
            
            controls.addEventListener('unlock', () => { 
                if (!isDead) document.getElementById('ui-layer').style.display = 'flex'; 
                document.getElementById('crosshair').style.display = 'none'; 
                document.getElementById('scope-overlay').style.display = 'none';
                document.getElementById('weapon-hud').style.display = 'none';
                isShooting = false; 
                isADS = false; 
            });

            document.addEventListener('keydown', (e) => { 
                switch(e.code){ 
                    case 'KeyW': moveForward=true; break; 
                    case 'KeyA': moveLeft=true; break; 
                    case 'KeyS': moveBackward=true; break; 
                    case 'KeyD': moveRight=true; break; 
                    case 'Space': if(canJump) velocity.y += JUMP_FORCE; canJump=false; break; 
                    case 'ShiftLeft': isSprinting=true; break; 
                    case 'Digit1': currentWeaponIdx = 0; updateArsenalUI(); updateViewmodel(); break; 
                    case 'Digit2': currentWeaponIdx = 1; updateArsenalUI(); updateViewmodel(); break; 
                    case 'Digit3': currentWeaponIdx = 4; updateArsenalUI(); updateViewmodel(); break; 
                    case 'Digit4': currentWeaponIdx = 3; updateArsenalUI(); updateViewmodel(); break; 
                    case 'Digit5': currentWeaponIdx = 2; updateArsenalUI(); updateViewmodel(); break; 
                } 
            });
            document.addEventListener('keyup', (e) => { switch(e.code){ case 'KeyW': moveForward=false; break; case 'KeyA': moveLeft=false; break; case 'KeyS': moveBackward=false; break; case 'KeyD': moveRight=false; break; case 'ShiftLeft': isSprinting=false; break; } });
            
            document.addEventListener('mousedown', (e) => { 
                if (e.button === 0) { isShooting = true; justClicked = true; } 
                if (e.button === 2) { isADS = true; } 
            });
            document.addEventListener('mouseup', (e) => { 
                if (e.button === 0) isShooting = false; 
                if (e.button === 2) { isADS = false; }
            });

            buildWorld();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
            updateViewmodel();
        }

        function updateArsenalUI() { document.querySelectorAll('.wep-select').forEach((b, i) => { if(i === currentWeaponIdx) b.classList.add('active-weapon'); else b.classList.remove('active-weapon'); }); }
        
        function updateViewmodel() { 
            const wep = WEAPONS[currentWeaponIdx]; 
            viewmodelGroup.scale.setScalar(wep.scale); 
            viewmodelGroup.children[0].material.color.setHex(wep.modelColor); 
            
            sightIronGroup.visible = (wep.sight === 'iron');
            sightReflexGroup.visible = (wep.sight === 'reflex');
            sightScopeGroup.visible = (wep.sight === 'scope');

            const mapping = {0: 1, 1: 2, 4: 3, 3: 4, 2: 5};
            document.getElementById('weapon-hud').innerText = `[${mapping[currentWeaponIdx]}] ${wep.name}`;
        }

        function addMapProp(x, y, z, w, h, d, color = 0x94a3b8) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshPhongMaterial({ color: color }));
            mesh.position.set(x, y, z);
            scene.add(mesh); obstacles.push(mesh);
            obstacleBBs.push(new THREE.Box3().setFromObject(mesh));
        }

        function buildWorld() {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000, 100, 100), new THREE.MeshBasicMaterial({color:0xbdc3c7, wireframe:true}));
            floor.rotateX(-Math.PI/2); scene.add(floor);
            
            addMapProp(0, 10, 0, 120, 20, 120, 0x475569); 
            
            for(let i=0; i<10; i++) {
                let h = (i+1) * 2; let y = h / 2;
                addMapProp(0, y, 60 + i * 4, 40, h, 4, 0x64748b);
                addMapProp(0, y, -60 - i * 4, 40, h, 4, 0x64748b);
                addMapProp(60 + i * 4, y, 0, 4, h, 40, 0x64748b);
                addMapProp(-60 - i * 4, y, 0, 4, h, 40, 0x64748b);
            }

            for(let i=0; i<60; i++){
                const w = Math.random()*80 + 20, h = Math.random()*150 + 20, d = Math.random()*80 + 20;
                let x = (Math.random()-0.5)*1800, z = (Math.random()-0.5)*1800;
                if(Math.abs(x) < 150 && Math.abs(z) < 150) { x += (x > 0 ? 150 : -150); z += (z > 0 ? 150 : -150); }
                addMapProp(x, h/2, z, w, h, d, 0x94a3b8);
            }

            for(let i=0; i<100; i++){
                let x = (Math.random()-0.5)*1500, z = (Math.random()-0.5)*1500;
                addMapProp(x, 5, z, 20, 10, 2, 0x334155);
            }

            for(let i=0; i<25; i++) {
                spawnEnemy((Math.random()-0.5)*800, (Math.random()-0.5)*800);
            }
            for(let i=0; i<40; i++) spawnTarget();
        }

        function spawnEnemy(x, z) {
            const geometry = new THREE.BoxGeometry(5, 12, 5);
            const material = new THREE.MeshPhongMaterial({ color: 0x166534 }); 
            const enemy = new THREE.Mesh(geometry, material);
            enemy.position.set(x, 6, z); 
            enemy.userData = { hp: 50, lastAttack: 0 };
            scene.add(enemy); enemies.push(enemy);
        }

        function spawnTarget() {
            const box = new THREE.Mesh(new THREE.BoxGeometry(6,6,6), new THREE.MeshPhongMaterial({color: TARGET_COLOR, flatShading:true}));
            box.position.set((Math.random()-0.5)*1500, Math.random()*60+20, (Math.random()-0.5)*1500);
            box.userData = { baseY: box.position.y, hover: Math.random()*2+1, off: Math.random()*Math.PI*2 };
            scene.add(box); targets.push(box);
        }

        function resetGame() {
            playerHP = 100; score = 0; kills = 0;
            updateUI();
            
            enemies.forEach(e => scene.remove(e)); enemies.length = 0;
            targets.forEach(t => scene.remove(t)); targets.length = 0;
            
            for(let i=0; i<25; i++) spawnEnemy((Math.random()-0.5)*800, (Math.random()-0.5)*800);
            for(let i=0; i<40; i++) spawnTarget();

            controls.getObject().position.set(0, 50, 200); 
        }

        function handleDeath() {
            if (isDead) return;
            isDead = true;
            controls.unlock();
            
            document.getElementById('death-score-val').innerText = score;
            document.getElementById('death-kills-val').innerText = kills;
            document.getElementById('death-screen').style.display = 'flex';
            
            document.getElementById('ui-layer').style.display = 'none';
            document.getElementById('crosshair').style.display = 'none';
            document.getElementById('scope-overlay').style.display = 'none';
            document.getElementById('weapon-hud').style.display = 'none';
            
            playSound(100, 'sawtooth', 1.0); 
        }

        function updateUI() {
            document.getElementById('hp-val').innerText = playerHP;
            document.getElementById('score-val').innerText = score;
            document.getElementById('kills-val').innerText = kills;
            document.getElementById('hp-bar-fill').style.width = playerHP + "%";
            document.getElementById('hp-bar-fill').style.background = playerHP <= 30 ? "#991b1b" : "#ef4444";
        }

        function triggerKillEffects() {
            const popup = document.getElementById('kill-popup');
            popup.classList.add('show');
            clearTimeout(killPopupTimeout);
            killPopupTimeout = setTimeout(() => popup.classList.remove('show'), 800);

            const feed = document.getElementById('kill-feed');
            const msg = document.createElement('div');
            msg.className = 'kill-msg';
            const wepName = WEAPONS[currentWeaponIdx].name;
            msg.innerHTML = `<span style="color:#38bdf8">OPERATIVE</span> [${wepName}] <span style="color:#166534">ZOMBIE</span>`;
            feed.appendChild(msg);
            setTimeout(() => { if (msg.parentNode) msg.parentNode.removeChild(msg); }, 3500);
        }

        function shoot(origin, direction) {
            const wep = WEAPONS[currentWeaponIdx];
            const proj = new THREE.Mesh(new THREE.SphereGeometry(wep.size, 8, 8), new THREE.MeshBasicMaterial({ color: PROJ_COLOR }));
            proj.position.copy(origin);
            
            proj.userData = { 
                velocity: direction.clone().multiplyScalar(wep.projSpeed), 
                lifespan: 3,
                damage: wep.damage,
                wepName: wep.name
            };
            
            scene.add(proj);
            activeProjectiles.push(proj);
            playSound(800, 'square', 0.1);
        }

        function handleHit(hitPoint, color, objHit, projData) {
            for(let k=0; k<5; k++) {
                const part = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.8), new THREE.MeshBasicMaterial({color: color }));
                part.position.copy(hitPoint);
                part.userData = { v: new THREE.Vector3((Math.random()-0.5)*30,(Math.random()-0.5)*30,(Math.random()-0.5)*30), l: 0.5 };
                scene.add(part); particles.push(part);
            }

            const eIdx = enemies.indexOf(objHit);
            if (eIdx > -1) {
                let actualDamage = projData.damage || 10;
                
                if (projData.wepName === "Sniper") {
                    const distToTarget = controls.getObject().position.distanceTo(hitPoint);
                    if (distToTarget > 300) actualDamage = 35; 
                }
                
                enemies[eIdx].userData.hp -= actualDamage; 
                
                if (enemies[eIdx].userData.hp <= 0) {
                    scene.remove(enemies[eIdx]); enemies.splice(eIdx, 1); 
                    score += 100; kills++; triggerKillEffects();
                    if (kills > 0 && kills % 10 === 0 && HP_ENABLED) { playerHP = Math.min(100, playerHP + 50); playSound(900, 'sine', 0.5); }
                    updateUI(); 
                    setTimeout(() => spawnEnemy((Math.random()-0.5)*1500, (Math.random()-0.5)*1500), 3000);
                }
                return;
            }
            
            const tIdx = targets.indexOf(objHit);
            if (tIdx > -1) {
                scene.remove(targets[tIdx]); targets.splice(tIdx, 1);
                score += 10; updateUI(); spawnTarget();
                return;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now(), delta = (time - prevTime)/1000;
            prevTime = time;

            if (controls.isLocked && !isDead) {
                const wep = WEAPONS[currentWeaponIdx];
                const targetFOV = isADS ? BASE_FOV / wep.zoom : BASE_FOV;
                camera.fov = THREE.MathUtils.lerp(camera.fov, targetFOV, 0.15);
                camera.updateProjectionMatrix();
                controls.pointerSpeed = isADS ? SENSITIVITY * 0.5 : SENSITIVITY;

                const scopeOverlay = document.getElementById('scope-overlay');
                const defaultCrosshair = document.getElementById('crosshair');

                if (isADS && wep.sight === 'scope') {
                    viewmodelGroup.visible = false;
                    scopeOverlay.style.display = 'block';
                    defaultCrosshair.style.display = 'none';
                } else {
                    viewmodelGroup.visible = true;
                    scopeOverlay.style.display = 'none';
                    
                    const vmTarget = isADS ? new THREE.Vector3(0, wep.adsY, wep.adsZ) : new THREE.Vector3(0.8, -0.6, -1.5);
                    viewmodelGroup.position.lerp(vmTarget, 0.15);
                    
                    if (isADS && (wep.sight === 'iron' || wep.sight === 'reflex')) {
                        defaultCrosshair.style.display = 'none';
                    } else {
                        defaultCrosshair.style.display = 'block';
                        defaultCrosshair.style.opacity = isADS ? "0.2" : "1";
                    }
                }

                if (isShooting && (wep.auto || justClicked)) {
                    const start = new THREE.Vector3(); 
                    if (!viewmodelGroup.visible) {
                        start.copy(controls.getObject().position);
                    } else {
                        barrelTip.getWorldPosition(start);
                    }

                    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                    const hits = raycaster.intersectObjects([...targets, ...enemies, ...obstacles]);
                    const targetPos = new THREE.Vector3();
                    if (hits.length > 0) targetPos.copy(hits[0].point); 
                    else { const aim = new THREE.Vector3(); camera.getWorldDirection(aim); targetPos.copy(camera.position).add(aim.multiplyScalar(5000)); }
                    
                    const dir = targetPos.sub(start).normalize();
                    if (time - lastFireTime > wep.fireRate) {
                        shoot(start, dir); lastFireTime = time; justClicked = false;
                        if (viewmodelGroup.visible) viewmodelGroup.position.z += 0.2; 
                    }
                }

                targets.forEach(t => t.position.y = t.userData.baseY + Math.sin(time/1000 * t.userData.hover + t.userData.off)*5);

                enemies.forEach(enemy => {
                    const dist = enemy.position.distanceTo(controls.getObject().position);
                    if (dist < 500) {
                        const targetPos = controls.getObject().position.clone();
                        targetPos.y = enemy.position.y;
                        enemy.lookAt(targetPos);
                        
                        if (dist > 15) { 
                            enemy.translateZ(12 * delta); 
                        } else {
                            if (time - enemy.userData.lastAttack > 1000) {
                                if (HP_ENABLED) {
                                    playerHP -= 20; updateUI();
                                    playSound(150, 'sawtooth', 0.2); 
                                    if (playerHP <= 0) handleDeath();
                                }
                                enemy.userData.lastAttack = time;
                            }
                        }
                    }
                });

                for (let i = activeProjectiles.length - 1; i >= 0; i--) {
                    const p = activeProjectiles[i]; 
                    const moveDist = p.userData.velocity.length() * delta;
                    
                    raycaster.set(p.position, p.userData.velocity.clone().normalize());
                    let hitObj = null; let hitPoint = null;

                    const hits = raycaster.intersectObjects([...enemies, ...targets, ...obstacles]);
                    if (hits.length > 0 && hits[0].distance <= moveDist) {
                        hitObj = hits[0].object; hitPoint = hits[0].point;
                    }

                    if (hitObj) {
                        p.position.copy(hitPoint); 
                        handleHit(hitPoint, PROJ_COLOR, hitObj, p.userData);
                        scene.remove(p); activeProjectiles.splice(i, 1);
                    } else {
                        p.position.add(p.userData.velocity.clone().multiplyScalar(delta));
                        p.userData.lifespan -= delta;
                        if (p.userData.lifespan <= 0) { scene.remove(p); activeProjectiles.splice(i, 1); }
                    }
                }

                for(let i=particles.length-1; i>=0; i--){
                    const p = particles[i]; p.position.add(p.userData.v.clone().multiplyScalar(delta));
                    p.userData.l -= delta; p.scale.multiplyScalar(0.95);
                    if(p.userData.l <= 0){ scene.remove(p); particles.splice(i,1); }
                }

                velocity.x -= velocity.x * 10 * delta; velocity.z -= velocity.z * 10 * delta; velocity.y -= GRAVITY * delta;
                direction.z = Number(moveForward) - Number(moveBackward); direction.x = Number(moveRight) - Number(moveLeft); direction.normalize();
                
                const sprintSpeed = isSprinting ? 500 : 250;
                const activeSpeed = isADS ? sprintSpeed * 0.5 : sprintSpeed; 

                if (moveForward || moveBackward) velocity.z -= direction.z * activeSpeed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * activeSpeed * delta;
                
                const startPos = controls.getObject().position.clone();
                let playerFeetY = controls.getObject().position.y - PLAYER_HEIGHT/2;
                
                controls.moveRight(-velocity.x * delta);
                const posAfterX = controls.getObject().position.clone();
                let pBB_Horiz = new THREE.Box3().setFromCenterAndSize(
                    new THREE.Vector3(posAfterX.x, playerFeetY + STEP_OFFSET + (PLAYER_HEIGHT - STEP_OFFSET)/2, startPos.z), 
                    new THREE.Vector3(PLAYER_RADIUS * 2, PLAYER_HEIGHT - STEP_OFFSET, PLAYER_RADIUS * 2)
                );
                for(let bb of obstacleBBs) if(pBB_Horiz.intersectsBox(bb)){ controls.getObject().position.x = startPos.x; break; }

                controls.moveForward(-velocity.z * delta);
                const posAfterZ = controls.getObject().position.clone();
                pBB_Horiz.setFromCenterAndSize(
                    new THREE.Vector3(controls.getObject().position.x, playerFeetY + STEP_OFFSET + (PLAYER_HEIGHT - STEP_OFFSET)/2, posAfterZ.z), 
                    new THREE.Vector3(PLAYER_RADIUS * 2, PLAYER_HEIGHT - STEP_OFFSET, PLAYER_RADIUS * 2)
                );
                for(let bb of obstacleBBs) if(pBB_Horiz.intersectsBox(bb)){ controls.getObject().position.z = startPos.z; break; }

                const oldFeetY = playerFeetY;
                controls.getObject().position.y += (velocity.y * delta);
                playerFeetY = controls.getObject().position.y - PLAYER_HEIGHT/2;
                
                let pBB_Vert = new THREE.Box3().setFromCenterAndSize(
                    new THREE.Vector3(controls.getObject().position.x, controls.getObject().position.y, controls.getObject().position.z), 
                    new THREE.Vector3(PLAYER_RADIUS * 2, PLAYER_HEIGHT, PLAYER_RADIUS * 2)
                );

                let onGround = false;
                for(let bb of obstacleBBs){
                    if(pBB_Vert.intersectsBox(bb)){
                        const wasAbove = oldFeetY >= bb.max.y - 0.5;
                        const isStep = bb.max.y > playerFeetY && bb.max.y <= oldFeetY + STEP_OFFSET + 0.1;
                        
                        if (wasAbove || isStep) {
                            controls.getObject().position.y = bb.max.y + PLAYER_HEIGHT/2; 
                            velocity.y = 0; onGround = true; 
                        } else if (velocity.y > 0 && oldFeetY + PLAYER_HEIGHT < bb.min.y + 1) { 
                            controls.getObject().position.y = bb.min.y - PLAYER_HEIGHT/2; 
                            velocity.y = 0; 
                        }
                        
                        pBB_Vert.setFromCenterAndSize(
                            new THREE.Vector3(controls.getObject().position.x, controls.getObject().position.y, controls.getObject().position.z), 
                            new THREE.Vector3(PLAYER_RADIUS * 2, PLAYER_HEIGHT, PLAYER_RADIUS * 2)
                        );
                    }
                }
                
                if(controls.getObject().position.y <= PLAYER_HEIGHT){ velocity.y = 0; controls.getObject().position.y = PLAYER_HEIGHT; onGround = true; }
                if(onGround) canJump = true;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
