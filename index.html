<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Zenith - v1.7</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #e0eaf5; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background-color: rgba(240, 248, 255, 0.9); z-index: 10; }
        
        .menu-panel { text-align: center; color: #2c3e50; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 420px; display: none; }
        #start-menu { display: block; }
        
        button { background: #3498db; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 10px; font-weight: bold; width: 100%; transition: background 0.2s; }
        button:hover { background: #2980b9; }
        button.secondary { background: #7f8c8d; }
        button.secondary:hover { background: #636e72; }
        
        h1 { margin: 0 0 10px 0; }
        .version { font-size: 0.8rem; color: #bdc3c7; margin-top: 15px; display: block; }
        
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #e74c3c; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; display: none; z-index: 5; }
        #score-ui { position: absolute; top: 20px; left: 20px; font-size: 1.5rem; color: #2c3e50; font-weight: bold; display: none; z-index: 5; background: rgba(255, 255, 255, 0.8); padding: 10px 20px; border-radius: 8px; }
        
        .setting-row { margin: 15px 0; text-align: left; display: flex; justify-content: space-between; align-items: center; }
        input[type=range] { width: 60%; cursor: pointer; }
        input[type=color] { width: 40px; height: 40px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="start-menu" class="menu-panel">
            <h1>Project: Zenith</h1>
            <p>W,A,S,D to move. SHIFT to sprint.<br>SPACE to jump. Click to fire.</p>
            <button id="play-btn">PLAY</button>
            <button id="settings-btn" class="secondary">SETTINGS</button>
            <span class="version">Version 1.7 - Sprint & Collision Fix</span>
        </div>

        <div id="settings-main-menu" class="menu-panel">
            <h1>Settings</h1>
            <p>Select a category</p>
            <button id="open-physics">PHYSICS</button>
            <button id="open-visuals">VISUALS</button>
            <button id="back-to-main" class="secondary">BACK TO MENU</button>
        </div>

        <div id="physics-menu" class="menu-panel">
            <h1>Physics</h1>
            <div class="setting-row">
                <label>Jump Force: <span id="jump-val">125</span></label>
                <input type="range" id="jump-slider" min="50" max="400" value="125">
            </div>
            <button class="back-to-settings secondary">BACK</button>
        </div>

        <div id="visuals-menu" class="menu-panel">
            <h1>Visuals</h1>
            <div class="setting-row">
                <label>Target Color</label>
                <input type="color" id="target-color-picker" value="#3498db">
            </div>
            <div class="setting-row">
                <label>Projectile Color</label>
                <input type="color" id="proj-color-picker" value="#e74c3c">
            </div>
            <button class="back-to-settings secondary">BACK</button>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="score-ui">SCORE: 0</div>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.150.1/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/" } } </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        let camera, scene, renderer, controls;
        const targets = [], obstacles = [], obstacleBBs = [], activeProjectiles = [], particles = [];
        let score = 0, prevTime = performance.now();
        const velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false, isSprinting = false;
        
        // Settings State
        let JUMP_FORCE = 125;
        let TARGET_COLOR = 0x3498db;
        let PROJ_COLOR = 0xe74c3c;
        const PLAYER_HEIGHT = 10;
        const GRAVITY = 9.8 * 50.0;
        const PLAYER_RADIUS = 3;

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = PLAYER_HEIGHT;
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xdbe9f4);
            scene.fog = new THREE.Fog(0xdbe9f4, 0, 300);

            const ambientLight = new THREE.HemisphereLight(0xffffff, 0x8d99ae, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 100, 50);
            scene.add(dirLight);

            controls = new PointerLockControls(camera, document.body);

            // UI LOGIC
            const uiLayer = document.getElementById('ui-layer');
            const startMenu = document.getElementById('start-menu');
            const settingsMainMenu = document.getElementById('settings-main-menu');
            const physicsMenu = document.getElementById('physics-menu');
            const visualsMenu = document.getElementById('visuals-menu');

            document.getElementById('play-btn').onclick = () => controls.lock();
            document.getElementById('settings-btn').onclick = () => { startMenu.style.display='none'; settingsMainMenu.style.display='block'; };
            document.getElementById('open-physics').onclick = () => { settingsMainMenu.style.display='none'; physicsMenu.style.display='block'; };
            document.getElementById('open-visuals').onclick = () => { settingsMainMenu.style.display='none'; visualsMenu.style.display='block'; };
            document.getElementById('back-to-main').onclick = () => { settingsMainMenu.style.display='none'; startMenu.style.display='block'; };
            document.querySelectorAll('.back-to-settings').forEach(b => b.onclick = () => { physicsMenu.style.display='none'; visualsMenu.style.display='none'; settingsMainMenu.style.display='block'; });

            document.getElementById('jump-slider').oninput = (e) => { JUMP_FORCE = parseFloat(e.target.value); document.getElementById('jump-val').innerText = e.target.value; };
            document.getElementById('target-color-picker').oninput = (e) => { TARGET_COLOR = parseInt(e.target.value.replace('#','0x')); updateTargetColors(); };
            document.getElementById('proj-color-picker').oninput = (e) => { PROJ_COLOR = parseInt(e.target.value.replace('#','0x')); };

            controls.addEventListener('lock', () => { uiLayer.style.display = 'none'; document.getElementById('crosshair').style.display = 'block'; document.getElementById('score-ui').style.display = 'block'; });
            controls.addEventListener('unlock', () => { uiLayer.style.display = 'flex'; document.getElementById('crosshair').style.display = 'none'; document.getElementById('score-ui').style.display = 'none'; });

            scene.add(controls.getObject());

            // Movement Inputs
            document.addEventListener('keydown', (e) => {
                switch(e.code){ 
                    case 'KeyW': moveForward=true; break; 
                    case 'KeyA': moveLeft=true; break; 
                    case 'KeyS': moveBackward=true; break; 
                    case 'KeyD': moveRight=true; break; 
                    case 'Space': if(canJump) velocity.y += JUMP_FORCE; canJump=false; break; 
                    case 'ShiftLeft': 
                    case 'ShiftRight': isSprinting=true; break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch(e.code){ 
                    case 'KeyW': moveForward=false; break; 
                    case 'KeyA': moveLeft=false; break; 
                    case 'KeyS': moveBackward=false; break; 
                    case 'KeyD': moveRight=false; break; 
                    case 'ShiftLeft': 
                    case 'ShiftRight': isSprinting=false; break;
                }
            });
            document.addEventListener('mousedown', shoot);

            buildWorld();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateTargetColors() {
            targets.forEach(t => t.material.color.setHex(TARGET_COLOR));
        }

        function createExplosion(pos, color) {
            for(let i=0; i<15; i++) {
                const particle = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({color: color}));
                particle.position.copy(pos);
                particle.userData = {
                    velocity: new THREE.Vector3((Math.random()-0.5)*20, (Math.random()-0.5)*20, (Math.random()-0.5)*20),
                    lifespan: 1.0
                };
                scene.add(particle);
                particles.push(particle);
            }
        }

        function buildWorld() {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(500,500,50,50), new THREE.MeshBasicMaterial({color:0xbdc3c7, wireframe:true}));
            floor.rotateX(-Math.PI/2); scene.add(floor);
            
            const pillarMat = new THREE.MeshPhongMaterial({ color: 0x95a5a6 });
            for(let i=0; i<30; i++){
                const w = Math.random() * 20 + 10; 
                const h = Math.random() * 35 + 5;  
                const d = Math.random() * 20 + 10; 

                const pillarGeo = new THREE.BoxGeometry(w, h, d);
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                
                pillar.position.set((Math.random()-0.5)*300, h/2, (Math.random()-0.5)*300);
                scene.add(pillar); 
                obstacles.push(pillar);
                obstacleBBs.push(new THREE.Box3().setFromObject(pillar));
            }
            
            for(let i=0; i<30; i++) spawnSingleTarget();
        }

        function spawnSingleTarget() {
            const box = new THREE.Mesh(new THREE.BoxGeometry(4,4,4), new THREE.MeshPhongMaterial({color: TARGET_COLOR, flatShading:true}));
            box.position.set((Math.random()-0.5)*300, Math.random()*20+20, (Math.random()-0.5)*300);
            box.userData = { baseY: box.position.y, hoverSpeed: Math.random()*2+1, hoverOffset: Math.random()*Math.PI*2, rot: Math.random()*0.02 };
            scene.add(box); targets.push(box);
        }

        function shoot() {
            if(!controls.isLocked) return;
            const projectile = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({ color: PROJ_COLOR }));
            projectile.position.copy(controls.getObject().position); 
            
            const aim = new THREE.Vector3(); camera.getWorldDirection(aim);
            projectile.userData = { velocity: aim.multiplyScalar(300), lifespan: 2.0 };
            scene.add(projectile); activeProjectiles.push(projectile);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now(), delta = (time - prevTime)/1000;
            
            targets.forEach(t => { t.position.y = t.userData.baseY + Math.sin(time/1000 * t.userData.hoverSpeed + t.userData.hoverOffset)*5; t.rotation.y += t.userData.rot; });

            for(let i=particles.length-1; i>=0; i--){
                const p = particles[i];
                p.position.add(p.userData.velocity.clone().multiplyScalar(delta));
                p.userData.lifespan -= delta;
                p.scale.multiplyScalar(0.95); 
                if(p.userData.lifespan <= 0) { scene.remove(p); particles.splice(i,1); }
            }

            for (let i = activeProjectiles.length - 1; i >= 0; i--) {
                const p = activeProjectiles[i];
                p.position.add(p.userData.velocity.clone().multiplyScalar(delta));
                p.userData.lifespan -= delta;
                let hit = false;
                const pBB = new THREE.Box3().setFromObject(p);
                
                for (let bb of obstacleBBs) { if (pBB.intersectsBox(bb)) { hit = true; break; } }
                
                if (!hit) {
                    for (let j = 0; j < targets.length; j++) {
                        if (pBB.intersectsBox(new THREE.Box3().setFromObject(targets[j]))) {
                            createExplosion(targets[j].position, PROJ_COLOR);
                            scene.remove(targets[j]); targets.splice(j, 1);
                            score += 10; document.getElementById('score-ui').innerText = "SCORE: " + score;
                            spawnSingleTarget(); hit = true; break;
                        }
                    }
                }
                if (hit || p.userData.lifespan <= 0) { scene.remove(p); activeProjectiles.splice(i, 1); }
            }

            if(controls.isLocked){
                velocity.x -= velocity.x * 10.0 * delta; 
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= GRAVITY * delta;
                
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();
                
                // SPRINT LOGIC IMPLEMENTED HERE
                const baseSpeed = 200.0;
                const activeSpeed = isSprinting ? baseSpeed * 1.8 : baseSpeed;

                if(moveForward || moveBackward) velocity.z -= direction.z * activeSpeed * delta;
                if(moveLeft || moveRight) velocity.x -= direction.x * activeSpeed * delta;
                
                const prevX = controls.getObject().position.x;
                const prevZ = controls.getObject().position.z;
                
                controls.moveRight(-velocity.x * delta); 
                controls.moveForward(-velocity.z * delta);
                
                // COLLISION FIX: Offset the bottom of the bounding box up by 0.2 to stop scraping the top of pillars
                let playerBB = new THREE.Box3().setFromCenterAndSize(
                    controls.getObject().position.clone().setY(controls.getObject().position.y - PLAYER_HEIGHT/2 + 0.1), 
                    new THREE.Vector3(PLAYER_RADIUS * 2, PLAYER_HEIGHT - 0.2, PLAYER_RADIUS * 2)
                );

                for(let bb of obstacleBBs){ 
                    if(playerBB.intersectsBox(bb)){ 
                        controls.getObject().position.x = prevX;
                        controls.getObject().position.z = prevZ;
                        velocity.x = 0; velocity.z = 0; 
                        break; 
                    } 
                }

                controls.getObject().position.y += (velocity.y * delta);
                
                // Reset box size for strict vertical landing checks
                playerBB.setFromCenterAndSize(
                    controls.getObject().position.clone().setY(controls.getObject().position.y - PLAYER_HEIGHT/2), 
                    new THREE.Vector3(PLAYER_RADIUS * 2, PLAYER_HEIGHT, PLAYER_RADIUS * 2)
                );

                let onGround = false;
                for(let bb of obstacleBBs){
                    if(playerBB.intersectsBox(bb)){
                        if(velocity.y < 0) {
                            controls.getObject().position.y = bb.max.y + PLAYER_HEIGHT;
                            velocity.y = 0;
                            onGround = true;
                        } else if (velocity.y > 0) {
                            controls.getObject().position.y = bb.min.y;
                            velocity.y = 0;
                        }
                        break;
                    }
                }

                if(controls.getObject().position.y <= PLAYER_HEIGHT){ 
                    velocity.y = 0; 
                    controls.getObject().position.y = PLAYER_HEIGHT; 
                    onGround = true; 
                }
                
                if (onGround) canJump = true;
            }
            
            prevTime = time; renderer.render(scene, camera);
        }
    </script>
</body>
</html>
